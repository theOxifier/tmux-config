# --------#
# General #
# --------#

# Default shell
set -g default-shell /usr/sbin/zsh

# Mouse
set -g mouse on
bind-key -T copy-mode-vi WheelUpPane send -N1 -X scroll-up
bind-key -T copy-mode-vi WheelDownPane send -N1 -X scroll-down


# History
set -g history-limit 102400

# Set windows and page index to base 1
set -g base-index 1
setw -g pane-base-index 1

# Re-number windows when creating/closing new windows
set -g renumber-windows on

# Use vim key bindings in copy mode
setw -g mode-keys vi
set-window-option -g mode-keys vi

# Fix ESC delay in vim
set -g escape-time 10

# Split panes with \ and -
bind '\' split-window -h -c "#{pane_current_path}"
bind '-' split-window -v -c "#{pane_current_path}"
# Toggle faux outer frame (margin panes) for single-pane windows
bind F run-shell '~/.tmux/toggle-outer-frame.sh'
unbind '"'
unbind %

# Remember current path when creating new windows
bind c new-window -c '#{pane_current_path}'

# -----------#
# Status bar #
# -----------#
set-option -g status-justify left
set-option -g status-left '#[fg=#f7768e,bg=#1a1b26,bold] #S #[fg=#7aa2f7,bg=#1a1b26] '
set-option -g status-left-length 16
set-option -g status-style "fg=#a9b1d6,bg=#16161e"
set-option -g status-right '#[fg=#ff9e64,bg=#1a1b26] %a %R '
set-option -g status-interval 60

set-window-option -g window-status-format ' #[fg=#7dcfff]#I #[fg=#a9b1d6]#W#[fg=#565f89]#F '
set-window-option -g window-status-current-format ' #[fg=#000000]#I #[fg=#1a1b26]#W#[fg=#292e42]#F '
set-option -g window-status-style "bg=#1a1b26"
set-option -g window-status-current-style "bg=#7aa2f7,bold"
set-option -g mode-style "fg=#1a1b26,bg=#7dcfff"
set-option -g message-style "fg=#c0caf5,bg=#292e42"

# ---------------#
# Plugin Manager #
# ---------------#
# List of plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'christoomey/vim-tmux-navigator'
set -g @plugin 'alexwforsythe/tmux-which-key'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @plugin 'timvw/tmux-assistant-resurrect'

# Capture assistant-specific env vars on save/restore (optional).
#set -g @assistant-resurrect-capture-env 'VIRTUAL_ENV NODE_ENV'

# Initialize TMUX plugin manager
run -b '~/.tmux/plugins/tpm/tpm'

# Unified pane border status and border highlighting
set -g pane-border-lines heavy
set -g pane-border-status top
set -g pane-border-format "#{?#{==:#{pane_title},__frame__},,#{?pane_active,#[bold]#[fg=#f7768e],#[fg=#565f89]}  #{pane_index}: #{pane_title}  }"
set -g pane-border-style "fg=#292e42,bg=#16161e"
set -g pane-active-border-style "fg=#f7768e,bg=#16161e"
